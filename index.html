<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nexus</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nexus">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1c1917">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#1c1917;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    text-align:center;
    padding:40px 32px;
  }
  .icon{
    width:72px;height:72px;
    border-radius:18px;
    margin:0 auto 20px;
    display:block;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  h1{
    font-size:22px;font-weight:700;
    color:#f5f5f4;letter-spacing:-.3px;
    margin-bottom:6px;
  }
  p{
    font-size:13px;color:#78716c;
    margin-bottom:28px;
  }
  a.btn{
    display:inline-block;
    background:#10b981;color:#fff;
    text-decoration:none;
    font-size:15px;font-weight:600;
    padding:13px 28px;
    border-radius:12px;
    letter-spacing:-.1px;
    transition:opacity .15s;
  }
  a.btn:active{opacity:.8;}
</style>
</head>
<body>

<div class="card">
  <img class="icon" src="icon.png" alt="Nexus">
  <h1>Nexus</h1>
  <p>Kişisel dashboard</p>
  <a class="btn" href="https://script.google.com/macros/s/AKfycby2jQVlWap-bfTgj0Kuj_0n_1CyGfg7wJKuLAs9OckQerIro-ZLBkQbJwdkrV5loe8jjg/exec" target="_top">
    Aç →
  </a>
</div>

</body>
</html>
