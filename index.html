<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pillbox">
  <title>Pillbox</title>
  
  <link rel="icon" type="image/jpeg" href="icon.jpg">
  <link rel="apple-touch-icon" href="icon.jpg">

  <style>
    body { background: #F2F4F6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; }
    .loader { text-align: center; color: #8A8F99; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
    .spinner { margin: 0 auto 12px; width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #5C5A8C; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-view" class="loader">
    <div class="spinner"></div>
    Fetching Pillbox...
  </div>

  <div id="app-root"></div>

  <script>
    // PASTE YOUR APPS SCRIPT WEB APP URL HERE
    const API_URL = 'https://script.google.com/macros/s/AKfycby2jQVlWap-bfTgj0Kuj_0n_1CyGfg7wJKuLAs9OckQerIro-ZLBkQbJwdkrV5loe8jjg/exec';

    fetch(API_URL)
      .then(res => res.json())
      .then(payload => {
        document.getElementById('loading-view').style.display = 'none';
        
        // Inject CSS
        const style = document.createElement('style');
        style.textContent = payload.css;
        document.head.appendChild(style);
        
        // Inject HTML
        document.getElementById('app-root').innerHTML = payload.html;
        
        // Inject and execute JS / Data
        const script = document.createElement('script');
        script.textContent = `
          const appData = ${payload.data};
          ${payload.js}
        `;
        document.body.appendChild(script);
      })
      .catch(err => {
        document.getElementById('loading-view').innerHTML = "Failed to load data.<br>" + err;
      });
  </script>
</body>
</html>
